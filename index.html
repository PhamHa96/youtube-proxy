<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="robots" content="noindex">
    <title>YT</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #player {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="player"></div>

    <!-- YouTube Iframe API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let player;
        let hasDirectIframeFallback = false;

        const params = new URLSearchParams(window.location.search);
        const videoId = params.get("v");

        if (!videoId) {
            document.body.innerHTML =
                '<div style="color:white;padding:20px;text-align:center">Missing ?v=VIDEO_ID</div>';
            throw new Error("Missing videoId");
        }

        const autoplay = params.get("autoplay") || "0";
        const controls = params.get("controls") || "1";
        const loop = params.get("loop") || "0";
        const mute = params.get("mute") || "0";
        const playsinline = params.get("playsinline") || "1";
        const playlist = params.get("playlist") || videoId;
        const playerOrigin =
            params.get("origin") ||
            (window.location.protocol === "http:" ||
            window.location.protocol === "https:"
                ? window.location.origin
                : "https://repairsolutions.com");
        const widgetReferrer = params.get("widget_referrer") || playerOrigin;
        const parentOrigin = params.get("parent_origin") || "*";

        function buildEmbedUrl() {
            const embedParams = new URLSearchParams({
                autoplay,
                controls,
                playsinline,
                mute,
                rel: "0",
                modestbranding: "1",
                origin: playerOrigin,
                widget_referrer: widgetReferrer,
                enablejsapi: "1",
            });

            if (loop === "1") {
                embedParams.set("loop", "1");
                embedParams.set("playlist", playlist);
            }

            return `https://www.youtube.com/embed/${videoId}?${embedParams.toString()}`;
        }

        function applyIframeAttributes(iframe) {
            iframe.referrerPolicy = "strict-origin-when-cross-origin";
            iframe.allow =
                "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen";
            iframe.allowFullscreen = true;
            iframe.setAttribute("allowfullscreen", "true");
            iframe.setAttribute("webkitallowfullscreen", "true");
            iframe.setAttribute("playsinline", "true");
            iframe.setAttribute("frameborder", "0");
        }

        function post(type, data) {
            window.parent.postMessage(
                {
                    source: "YT_PROXY",
                    type,
                    data,
                },
                parentOrigin
            );
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player("player", {
                videoId,
                host: "https://www.youtube.com",
                playerVars: {
                    autoplay,
                    controls,
                    playsinline,
                    mute,
                    loop,
                    playlist: loop === "1" ? playlist : undefined,
                    modestbranding: 1,
                    rel: 0,
                    origin: playerOrigin,
                    widget_referrer: widgetReferrer,
                },
                events: {
                    onReady: () => {
                        const iframe = document.querySelector("iframe");
                        if (iframe) {
                            applyIframeAttributes(iframe);
                        }
                        post("READY");
                    },
                    onStateChange: (e) => {
                        post("STATE_CHANGE", e.data);
                    },
                    onError: (e) => {
                        if (e.data === 5 && !hasDirectIframeFallback) {
                            hasDirectIframeFallback = true;

                            const directIframe = document.createElement("iframe");
                            directIframe.src = buildEmbedUrl();
                            directIframe.title = "YouTube video player";
                            directIframe.style.position = "absolute";
                            directIframe.style.inset = "0";
                            directIframe.style.width = "100%";
                            directIframe.style.height = "100%";
                            applyIframeAttributes(directIframe);

                            const playerContainer = document.getElementById("player");
                            playerContainer.innerHTML = "";
                            playerContainer.appendChild(directIframe);

                            post("READY");
                            post("FALLBACK", {
                                reason: "PLAYER_ERROR_5",
                                mode: "DIRECT_IFRAME",
                                src: directIframe.src,
                            });
                            return;
                        }

                        post("ERROR", e.data);
                    },
                },
            });
        }

        // Receive commands from parent
        window.addEventListener("message", (event) => {
            if (!player || !event.data) return;

            switch (event.data.type) {
                case "PLAY":
                    player.playVideo();
                    break;
                case "PAUSE":
                    player.pauseVideo();
                    break;
                case "STOP":
                    player.stopVideo();
                    break;
                case "MUTE":
                    player.mute();
                    break;
                case "UNMUTE":
                    player.unMute();
                    break;
                case "SET_VOLUME":
                    player.setVolume(event.data.value ?? 100);
                    break;
                case "SEEK":
                    player.seekTo(event.data.value ?? 0, true);
                    break;
            }
        });
    </script>
</body>

</html>
