<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>HAHA</title>
    <base href="/" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <!-- add to homescreen for ios -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <script type="text/javascript" charset="utf-8">
      // Begin NFC
      let startUpNfcEvent;
      /**
       * @readme: Innov@Team: Because AppComponent is loaded after NFC fires event
       * then we register here
       */
      // console.log('%c [NFC] - Starting event', 'background: #008000; color: #FF0000');
      document.addEventListener("ndef-mime", function (e) {
        // console.log('%c [NFC] - Found ndef-mime', 'background: #008000; color: #FF0000');
        startUpNfcEvent = e;
      }, false);
      // End NFC
      document.addEventListener(
        "deviceready",
        function () {
          // Begin NFC
          if (startUpNfcEvent) {
            // console.log('dispatch startUpNfcEvent');
            document.dispatchEvent(startUpNfcEvent);
          }
          // End NFC
          // Begin Helpscout
          !(function (e, n) {
            (window.Beacon = n =
              function (e, n, d) {
                window.Beacon.readyQueue.push({
                  method: e,
                  options: n,
                  data: d,
                });
              }),
              (n.readyQueue = []);
            var t = e.getElementsByTagName("script")[0],
              o = e.createElement("script");
            (o.type = "text/javascript"),
              (o.async = !0),
              (o.src = "https://beacon-v2.helpscout.net"),
              t.parentNode.insertBefore(o, t);
          })(document, window.Beacon || function () {});
          // End Helpscout

          // Begin CrazyEgg
          var he = document.getElementsByTagName("head")[0];
          if (he) {
            var cSrc = document.createElement("script");
            cSrc.type = "text/javascript";
            cSrc.src = "https://script.crazyegg.com/pages/scripts/0120/6807.js";
            he.appendChild(cSrc);
          }
          // End CrazyEgg
        },
        false
      );
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
