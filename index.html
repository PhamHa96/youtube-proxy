<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="robots" content="noindex">
    <title>YT</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #player {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="player"></div>

    <!-- YouTube Iframe API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let player;

        const params = new URLSearchParams(window.location.search);
        const videoId = params.get("v");

        if (!videoId) {
            document.body.innerHTML =
                '<div style="color:white;padding:20px;text-align:center">Missing ?v=VIDEO_ID</div>';
            throw new Error("Missing videoId");
        }

        const autoplay = params.get("autoplay") || "0";
        const controls = params.get("controls") || "1";
        const loop = params.get("loop") || "0";
        const mute = params.get("mute") || "0";
        const playsinline = params.get("playsinline") || "1";
        const playlist = params.get("playlist") || videoId;

        // Read origin param if provided by the embedding parent; fall back to '*'
        let parentOrigin = '*';
        const originParam = params.get('origin');
        if (originParam) {
            try {
                // origin may be URL-encoded by the embedder
                const decoded = decodeURIComponent(originParam);
                // validate it's an origin-like URL
                const u = new URL(decoded);
                parentOrigin = u.origin;
            } catch (err) {
                // ignore invalid origin
                parentOrigin = '*';
            }
        }

        function post(type, data) {
            // prefer explicit origin if available
            window.parent.postMessage({
                source: "YT_PROXY",
                type,
                data,
            }, parentOrigin);
        }

        function onYouTubeIframeAPIReady() {
            const playerVars = {
                autoplay,
                controls,
                playsinline,
                mute,
                loop,
                playlist: loop === "1" ? playlist : undefined,
                modestbranding: 1,
                rel: 0,
            };

            // Pass origin to playerVars when available to help YouTube accept embedding origin
            if (parentOrigin && parentOrigin !== '*') {
                playerVars.origin = parentOrigin;
            }

            player = new YT.Player("player", {
                videoId,
                playerVars,
                events: {
                    onReady: () => {
                        post("READY");
                    },
                    onStateChange: (e) => {
                        post("STATE_CHANGE", e.data);
                    },
                    onError: (e) => {
                        post("ERROR", e.data);
                    },
                },
            });
        }

        // Receive commands from parent
        window.addEventListener("message", (event) => {
            // If we have a validated parentOrigin, ensure messages come from it
            if (parentOrigin !== '*' && event.origin !== parentOrigin) return;
            if (!player || !event.data) return;

            switch (event.data.type) {
                case "PLAY":
                    player.playVideo();
                    break;
                case "PAUSE":
                    player.pauseVideo();
                    break;
                case "STOP":
                    player.stopVideo();
                    break;
                case "MUTE":
                    player.mute();
                    break;
                case "UNMUTE":
                    player.unMute();
                    break;
                case "SET_VOLUME":
                    player.setVolume(event.data.value ?? 100);
                    break;
                case "SEEK":
                    player.seekTo(event.data.value ?? 0, true);
                    break;
            }
        });
    </script>
</body>

</html>
