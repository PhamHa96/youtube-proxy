<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="robots" content="noindex">
    <title>YT</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #player {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="player"></div>

    <!-- YouTube Iframe API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let player;

        const params = new URLSearchParams(window.location.search);
        const videoId = params.get("v");

        if (!videoId) {
            document.body.innerHTML =
                '<div style="color:white;padding:20px;text-align:center">Missing ?v=VIDEO_ID</div>';
            throw new Error("Missing videoId");
        }

        const autoplay = params.get("autoplay") || "0";
        const controls = params.get("controls") || "1";
        const loop = params.get("loop") || "0";
        const mute = params.get("mute") || "0";
        const playsinline = params.get("playsinline") || "1";
        const playlist = params.get("playlist") || videoId;
        const playerOrigin =
            params.get("origin") ||
            (window.location.protocol === "http:" ||
            window.location.protocol === "https:"
                ? window.location.origin
                : "https://repairsolutions.com");
        const widgetReferrer = params.get("widget_referrer") || playerOrigin;

        function post(type, data) {
            window.parent.postMessage(
                {
                    source: "YT_PROXY",
                    type,
                    data,
                },
                "*"
            );
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player("player", {
                videoId,
                host: "https://www.youtube.com",
                playerVars: {
                    autoplay,
                    controls,
                    playsinline,
                    mute,
                    loop,
                    playlist: loop === "1" ? playlist : undefined,
                    modestbranding: 1,
                    rel: 0,
                    origin: playerOrigin,
                    widget_referrer: widgetReferrer,
                },
                events: {
                    onReady: () => {
                        const iframe = document.querySelector("iframe");
                        if (iframe) {
                            iframe.referrerPolicy = "strict-origin-when-cross-origin";
                            iframe.allow =
                                "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen";
                        }
                        post("READY");
                    },
                    onStateChange: (e) => {
                        post("STATE_CHANGE", e.data);
                    },
                    onError: (e) => {
                        post("ERROR", e.data);
                    },
                },
            });
        }

        // Receive commands from parent
        window.addEventListener("message", (event) => {
            if (!player || !event.data) return;

            switch (event.data.type) {
                case "PLAY":
                    player.playVideo();
                    break;
                case "PAUSE":
                    player.pauseVideo();
                    break;
                case "STOP":
                    player.stopVideo();
                    break;
                case "MUTE":
                    player.mute();
                    break;
                case "UNMUTE":
                    player.unMute();
                    break;
                case "SET_VOLUME":
                    player.setVolume(event.data.value ?? 100);
                    break;
                case "SEEK":
                    player.seekTo(event.data.value ?? 0, true);
                    break;
            }
        });
    </script>
</body>

</html>
