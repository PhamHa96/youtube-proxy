<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="robots" content="noindex">
    <title>YT</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #player {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>
    <!--
        Direct iframe embed — no YouTube IFrame API, no enablejsapi=1.
        Omitting enablejsapi avoids XPC mode, which causes "cannot parse response"
        on iOS 16.7.x (WebKit fails to handle the XPC-signed videoplayback responses).
    -->
    <iframe id="player"
        allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
        frameborder="0">
    </iframe>

    <script>
        var params = new URLSearchParams(window.location.search);
        var videoId = params.get("v");

        if (!videoId) {
            document.body.innerHTML =
                '<div style="color:white;padding:20px;text-align:center">Missing ?v=VIDEO_ID</div>';
            throw new Error("Missing videoId");
        }

        var controls   = params.get("controls")   || "1";
        var playsinline = params.get("playsinline") || "1";
        var mute       = params.get("mute")        || "0";
        var loop       = params.get("loop")        || "0";
        var playlist   = params.get("playlist")    || videoId;

        function post(type, data) {
            window.parent.postMessage({ source: "YT_PROXY", type: type, data: data }, "*");
        }

        var qs = new URLSearchParams({
            controls:    controls,
            playsinline: playsinline,
            mute:        mute,
            loop:        loop,
            rel:         "0",
        });
        if (loop === "1") qs.set("playlist", playlist);

        var player = document.getElementById("player");

        // youtube-nocookie.com + no enablejsapi → no XPC token in videoplayback URLs
        player.src = "https://www.youtube-nocookie.com/embed/" + videoId + "?" + qs.toString();

        player.addEventListener("load", function () {
            post("READY");
        });

        // Without enablejsapi=1 there are no postMessage events from YouTube,
        // so STATE_CHANGE and command forwarding are not available.
        // The user interacts with YouTube's built-in controls directly.
    </script>
</body>

</html>
